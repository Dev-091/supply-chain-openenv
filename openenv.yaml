name: supply-chain-env
version: 1.0.0
description: >
  A supply chain management environment where an AI agent manages
  inventory, selects suppliers, places reorders, and handles
  disruptions across simulated time steps.
author: DevSharma091
license: MIT
tasks:
  - id: task_easy
    name: Basic Reorder Policy
    difficulty: easy
    max_steps: 30
  - id: task_medium
    name: Supplier Selection
    difficulty: medium
    max_steps: 60
  - id: task_hard
    name: Disruption Mitigation
    difficulty: hard
    max_steps: 90
action_space:
  type: structured
  schema: Action
observation_space:
  type: structured
  schema: Observation
reward_range: [0.0, 1.0]